services:
  # PostgreSQL 16 with PostGIS
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ncts-postgres
    environment:
      POSTGRES_DB: ncts_dev
      POSTGRES_USER: ncts_user
      POSTGRES_PASSWORD: ncts_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ncts_user -d ncts_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7 — caching, sessions, rate limiting
  redis:
    image: redis:7-alpine
    container_name: ncts-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailpit — email testing (replaces deprecated Mailhog)
  mailpit:
    image: axllent/mailpit:latest
    container_name: ncts-mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

  # LocalStack — mock AWS services (S3, SES, EventBridge)
  localstack:
    image: localstack/localstack:3
    container_name: ncts-localstack
    environment:
      SERVICES: s3,ses,events
      DEFAULT_REGION: af-south-1
      DEBUG: 0
    ports:
      - "4566:4566"    # LocalStack Gateway
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  redis_data:
  localstack_data:
