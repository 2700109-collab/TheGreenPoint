# ═══════════════════════════════════════════════════════════════
# NCTS API Deployment Pipeline
# Builds Docker image and deploys to AWS ECS Fargate
# Triggered on push to main (production) or develop (staging)
# ═══════════════════════════════════════════════════════════════
name: Deploy API

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: af-south-1
  ECR_REPOSITORY: ncts-api
  ECS_CLUSTER: ncts-cluster
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set environment variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENVIRONMENT=production" >> $GITHUB_ENV
            echo "ECS_SERVICE=ncts-api-prod" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
            echo "ECS_SERVICE=ncts-api-staging" >> $GITHUB_ENV
          fi

      - name: Build, Tag, and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NODE_ENV=${{ env.ENVIRONMENT }} \
            --build-arg APP_VERSION=${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.ENVIRONMENT }}-latest \
            -f apps/api/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.ENVIRONMENT }}-latest

      - name: Download Current Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ncts-api-${{ env.ENVIRONMENT }} \
            --query taskDefinition > task-definition.json

      - name: Update ECS Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ncts-api
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Notify Deployment Success
        if: success()
        run: |
          echo "✅ Deployed ${{ env.ENVIRONMENT }} — ${{ github.sha }}"
          echo "🔗 Service: ${{ env.ECS_SERVICE }}"

      - name: Notify Deployment Failure
        if: failure()
        run: |
          echo "❌ Deployment failed for ${{ env.ENVIRONMENT }} — ${{ github.sha }}"
